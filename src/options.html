<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BookLike Options</title>
    <style>
      :root {
        --bg: #f5f5f4;
        --surface: #fff;
        --text: #1c1917;
        --muted: #78716c;
        --border: #e7e5e4;
        --accent: #ca8a04;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1917;
          --surface: #292524;
          --text: #fafaf9;
          --muted: #a8a29e;
          --border: #44403c;
          --accent: #facc15;
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 3rem 1rem;
      }
      main {
        width: 100%;
        max-width: 420px;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin-bottom: 2rem;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 14px 16px;
      }
      .row + .row {
        border-top: 1px solid var(--border);
      }
      .row-label {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .row-label span {
        font-weight: 500;
      }
      .row-label small {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }
      /* Toggle switch */
      .toggle {
        position: relative;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
      }
      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }
      .toggle-track {
        position: absolute;
        inset: 0;
        background: var(--border);
        border-radius: 20px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .toggle-track::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: white;
        transition: transform 0.2s;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      }
      .toggle input:checked + .toggle-track {
        background: var(--accent);
      }
      .toggle input:checked + .toggle-track::after {
        transform: translateX(16px);
      }
      .toggle input:focus-visible + .toggle-track {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BookLike</h1>
      <div class="card">
        <div class="row">
          <div class="row-label">
            <span>Context menu</span>
            <small>Show "Read in BookLike" when right-clicking a page</small>
          </div>
          <label class="toggle">
            <input type="checkbox" id="contextMenu" />
            <div class="toggle-track"></div>
          </label>
        </div>
      </div>
    </main>
    <script src="options.js"></script>
  </body>
</html>
